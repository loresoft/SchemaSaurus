name: Build

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_ENVIRONMENT: github
  ASPNETCORE_ENVIRONMENT: github
  BUILD_PATH: "${{github.workspace}}/artifacts"
  COVERAGE_PATH: "${{github.workspace}}/coverage"

permissions:
  contents: read
  code-quality: write

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Test
        run: dotnet test --no-build --configuration Release --results-directory "${{env.COVERAGE_PATH}}" --coverlet --coverlet-output-format cobertura

      - name: Merge Coverage
        if: success()
        run: |
          mapfile -t files < <(find "${{env.COVERAGE_PATH}}" -name 'coverage.cobertura.*.xml' -print)
          dnx dotnet-coverage -- merge "${files[@]}" -f cobertura -o "${{env.COVERAGE_PATH}}/coverage.cobertura.xml"

      - name: Upload Coverage
        if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-code-coverage@v1
        with:
          file: ${{ env.COVERAGE_PATH }}/coverage.cobertura.xml
          language: "C#"
          label: code-coverage/dotnet

      - name: Create Packages
        if: success() && github.event_name != 'pull_request'
        run: dotnet pack --configuration Release --no-build --output "${{env.BUILD_PATH}}"

      - name: Upload Packages
        if: success() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: "${{env.BUILD_PATH}}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success() && github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: packages

      - name: Publish Packages GitHub
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for package in $(find -name "*.nupkg"); do
            echo "${0##*/}": Pushing $package...
            dotnet nuget push "$package" --source https://nuget.pkg.github.com/loresoft/index.json --api-key "$GITHUB_PACKAGE_TOKEN" --skip-duplicate
          done

      - name: Publish Packages feedz
        env:
          FEEDZ_API_KEY: ${{ secrets.FEEDDZ_KEY }}
        run: |
          for package in $(find -name "*.nupkg"); do
            echo "${0##*/}": Pushing $package...
            dotnet nuget push "$package" --source https://f.feedz.io/loresoft/open/nuget/index.json --api-key "$FEEDZ_API_KEY" --skip-duplicate
          done

      - name: Publish Packages Nuget
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_KEY }}
        run: |
          for package in $(find -name "*.nupkg"); do
            echo "${0##*/}": Pushing $package...
            dotnet nuget push "$package" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
          done
